<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compact Compiler + ZKIR Keygen</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 8px;
            font-size: 1.5rem;
        }
        .subtitle {
            color: #8b949e;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
        }
        .panel h2 {
            font-size: 1rem;
            color: #58a6ff;
            margin-bottom: 12px;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            resize: vertical;
            tab-size: 2;
        }
        textarea:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        button {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-primary {
            background: #238636;
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            background: #2ea043;
        }
        .btn-secondary {
            background: #30363d;
            color: #c9d1d9;
        }
        .btn-secondary:hover:not(:disabled) {
            background: #484f58;
        }
        #log-output {
            height: 200px;
            overflow-y: auto;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 12px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            color: #8b949e;
        }
        #log-output div {
            padding: 1px 0;
        }
        #result-output {
            margin-top: 12px;
        }
        #result-output table {
            width: 100%;
            border-collapse: collapse;
            margin: 8px 0;
        }
        #result-output th, #result-output td {
            text-align: left;
            padding: 6px 12px;
            border-bottom: 1px solid #30363d;
        }
        #result-output th {
            color: #58a6ff;
            font-size: 0.85rem;
        }
        #result-output h3 {
            font-size: 0.95rem;
            color: #f0f6fc;
            margin-bottom: 8px;
        }
        #download-section {
            margin-top: 12px;
        }
        .file-tree {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.8;
        }
        .tree-folder {
            color: #79c0ff;
            font-weight: 600;
            padding: 2px 0;
        }
        .tree-file {
            padding: 1px 0;
        }
        .tree-file a {
            color: #58a6ff;
            text-decoration: none;
        }
        .tree-file a:hover {
            text-decoration: underline;
        }
        .indent-1 {
            padding-left: 20px;
        }
        .file-size {
            color: #8b949e;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>Compact Compiler + ZKIR Keygen</h1>
    <p class="subtitle">Compile Midnight Compact smart contracts and generate ZK proving keys — entirely in the browser via WebAssembly.</p>

    <div class="layout">
        <div class="panel">
            <h2>Compact Source</h2>
            <textarea id="source-input" spellcheck="false" placeholder="Enter your Compact source code..."></textarea>
            <div class="buttons">
                <button id="compile-btn" class="btn-primary">Compile</button>
                <button id="keygen-btn" class="btn-secondary" disabled>Generate Keys</button>
            </div>
        </div>
        <div class="panel">
            <h2>Log</h2>
            <div id="log-output"></div>
            <div id="result-output"></div>
            <div id="download-section"></div>
        </div>
    </div>
</body>
</html>
