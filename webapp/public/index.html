<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compact Compiler + ZKIR Keygen</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px 20px 220px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 8px;
            font-size: 1.5rem;
        }
        .subtitle {
            color: #8b949e;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .panel h2 {
            font-size: 1rem;
            color: #58a6ff;
            margin-bottom: 12px;
        }
        textarea {
            width: 100%;
            height: 300px;
            background: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            resize: vertical;
            tab-size: 2;
        }
        textarea:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        button {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-primary {
            background: #238636;
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            background: #2ea043;
        }
        .btn-secondary {
            background: #30363d;
            color: #c9d1d9;
        }
        .btn-secondary:hover:not(:disabled) {
            background: #484f58;
        }
        .btn-accent {
            background: #1f6feb;
            color: white;
        }
        .btn-accent:hover:not(:disabled) {
            background: #388bfd;
        }
        .btn-outline {
            background: transparent;
            color: #f85149;
            border: 1px solid #f85149;
        }
        .btn-outline:hover:not(:disabled) {
            background: rgba(248, 81, 73, 0.1);
        }
        #result-output {
            margin-top: 12px;
        }
        #result-output h3 {
            font-size: 0.95rem;
            color: #f0f6fc;
            margin-bottom: 8px;
        }
        #download-section {
            margin-top: 12px;
        }
        .file-tree {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.8;
        }
        .tree-folder {
            color: #79c0ff;
            font-weight: 600;
            padding: 2px 0;
        }
        .tree-file {
            padding: 1px 0;
        }
        .tree-file a {
            color: #58a6ff;
            text-decoration: none;
        }
        .tree-file a:hover {
            text-decoration: underline;
        }
        .indent-1 {
            padding-left: 20px;
        }
        .file-size {
            color: #8b949e;
            font-size: 12px;
        }

        /* Deploy section */
        .deploy-section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .deploy-section.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .deploy-section h2 {
            font-size: 1rem;
            color: #58a6ff;
            margin-bottom: 12px;
        }
        .deploy-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .deploy-row select {
            padding: 8px 12px;
            background: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .deploy-row select:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .wallet-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #8b949e;
        }
        .wallet-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f85149;
        }
        .wallet-status .dot.connected {
            background: #3fb950;
        }
        .deploy-info {
            margin-top: 12px;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            word-break: break-all;
        }
        .deploy-info .label {
            color: #8b949e;
            margin-right: 6px;
        }
        .deploy-info .value {
            color: #58a6ff;
        }
        .deploy-info .value.address {
            user-select: all;
            cursor: text;
        }
        /* Circuit interaction cards */
        .circuit-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #21262d;
            flex-wrap: wrap;
        }
        .circuit-card:last-child { border-bottom: none; }
        .circuit-name {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 14px;
            color: #79c0ff;
            font-weight: 600;
            min-width: 160px;
        }
        .circuit-card input {
            padding: 6px 10px;
            background: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            width: 140px;
        }
        .circuit-card input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .circuit-result {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            color: #3fb950;
        }

        /* Sticky log panel */
        #log-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #161b22;
            border-top: 1px solid #30363d;
            z-index: 100;
        }
        #log-panel .log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 20px;
            cursor: pointer;
            user-select: none;
        }
        #log-panel .log-header h2 {
            font-size: 0.9rem;
            color: #58a6ff;
            margin: 0;
        }
        #log-panel .log-header .toggle {
            color: #8b949e;
            font-size: 12px;
        }
        #log-output {
            height: 160px;
            overflow-y: auto;
            background: #0d1117;
            margin: 0 12px 12px;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 12px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            color: #8b949e;
        }
        #log-output div {
            padding: 1px 0;
        }
        #log-panel.collapsed #log-output {
            display: none;
        }
        #log-panel.collapsed {
            border-top: 2px solid #30363d;
        }
    </style>
</head>
<body>
    <h1>Compact Compiler + ZKIR Keygen</h1>
    <p class="subtitle">Compile Midnight Compact smart contracts and generate ZK proving keys — entirely in the browser via WebAssembly.</p>

    <!-- Compile -->
    <div class="panel">
        <h2>Compact Source</h2>
        <textarea id="source-input" spellcheck="false" placeholder="Enter your Compact source code..."></textarea>
        <div class="buttons">
            <button id="compile-btn" class="btn-primary">Compile</button>
            <button id="keygen-btn" class="btn-secondary" disabled>Generate Keys</button>
        </div>
    </div>

    <!-- Output -->
    <div class="panel">
        <h2>Output</h2>
        <div id="result-output"></div>
        <div id="download-section"></div>
    </div>

    <!-- Deploy to Network -->
    <div id="deploy-section" class="deploy-section disabled">
        <h2>Deploy to Network</h2>
        <div class="deploy-row">
            <select id="network-select">
                <option value="mainnet">Mainnet</option>
                <option value="preview">Preview</option>
                <option value="qanet">QANet</option>
                <option value="preprod">PreProd</option>
                <option value="undeployed">Local (undeployed)</option>
            </select>

            <div class="wallet-status">
                <span class="dot" id="wallet-dot"></span>
                <span id="wallet-label">No wallet connected</span>
            </div>

            <button id="connect-btn" class="btn-accent" disabled>Connect Wallet</button>
            <button id="disconnect-btn" class="btn-outline" style="display:none;">Disconnect</button>
            <button id="deploy-btn" class="btn-primary" disabled>Deploy Contract</button>
        </div>

        <div id="deploy-result" style="display:none;">
            <div class="deploy-info">
                <span class="label">Contract Address:</span>
                <span class="value address" id="contract-address">—</span>
            </div>
        </div>
    </div>

    <!-- Contract Interaction -->
    <div id="interact-section" class="deploy-section disabled">
        <h2>Contract Interaction</h2>

        <div class="deploy-row" style="margin-bottom: 12px;">
            <button id="read-state-btn" class="btn-secondary" disabled>Read Ledger State</button>
            <span id="ledger-state" class="wallet-status" style="font-family: 'SF Mono', 'Fira Code', monospace;"></span>
        </div>

        <div id="circuits-list"></div>
    </div>

    <!-- Sticky Log -->
    <div id="log-panel">
        <div class="log-header" id="log-toggle">
            <h2>Log</h2>
            <span class="toggle" id="log-toggle-label">collapse</span>
        </div>
        <div id="log-output"></div>
    </div>
</body>
</html>
